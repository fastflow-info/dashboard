/* chart shell — badge on chart h3 headings */
function chartShell(hostId, title, color, tagHtml){
  const host=document.getElementById(hostId); if(!host) return null;
  host.innerHTML='';
  const card=document.createElement('div'); card.className='chart-container';
  /* use outlined badge for "Company" / multi-entity charts, filled for single entity */
  const isMulti = !color || color === INK;
  const badgeHtml = entityBadgeHTML(title, color || INK, isMulti);
  card.innerHTML=`<h3>${badgeHtml}${tagHtml?`<span class="tag">${tagHtml}</span>`:''}</h3><div class="chart-wrap"></div>`;
  host.appendChild(card);
  return { card, wrap: card.querySelector('.chart-wrap') };
}

function barPath(x,y,w,h,r){
  if (h<=0) h = 0.0001;
  const rad = Math.min(w/2, h/2);
  return `M${x+rad},${y}
    L${x+w-rad},${y}
    A${rad},${rad} 0 0 1 ${x+w},${y+rad}
    L${x+w},${y+h-rad}
    A${rad},${rad} 0 0 1 ${x+w-rad},${y+h}
    L${x+rad},${y+h}
    A${rad},${rad} 0 0 1 ${x},${y+h-rad}
    L${x},${y+rad}
    A${rad},${rad} 0 0 1 ${x+rad},${y}
    Z`;
}

const _chartVisObserver = ('IntersectionObserver' in window)
  ? new IntersectionObserver((entries, obs)=>{
      for (const e of entries){
        if (e.isIntersecting){
          const fns = e.target._onVisibleFns;
          if (fns && fns.length){
            e.target._onVisibleFns = null;
            obs.unobserve(e.target);
            fns.forEach(fn=>fn());
          }
        }
      }
    }, { threshold: 0.18, rootMargin: '0px 0px -8% 0px' })
  : null;
function whenVisible(el, fn){
  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (prefersReduced || !_chartVisObserver){ fn(); return; }
  const r = el.getBoundingClientRect();
  if (r.top < (window.innerHeight||0) * 0.9 && r.bottom > 0){ fn(); return; }
  if (!el._onVisibleFns) el._onVisibleFns = [];
  el._onVisibleFns.push(fn);
  _chartVisObserver.observe(el);
}

function drawBars(wrap, groups, opts){
  opts = opts || {};
  const showValues = opts.showValues !== false;
  const yFmt = opts.yFmt || (v=>fmt(v));
  const valFmt = opts.valFmt || (v=>fmt(v));
  const rotate = !!opts.rotateX;
  const singleMetric = opts.singleMetric || null;

  const M = Object.assign({}, CHART.M, opts.margin||{});
  const width = (opts.width||CHART.W) - M.left - M.right;
  const height = (opts.height||CHART.H) - M.top - M.bottom;

  const svg = d3.select(wrap).append('svg')
    .attr('viewBox', `0 0 ${width+M.left+M.right} ${height+M.top+M.bottom}`)
    .attr('width','100%').style('font-family', CHART.FONT);
  const defs = svg.append('defs');
  const hoverGradId = `hoverbadge-${opts.uid}`;
  const hg = defs.append('linearGradient').attr('id',hoverGradId).attr('x1','0').attr('y1','0').attr('x2','1').attr('y2','1');
  hg.append('stop').attr('offset','0%').attr('stop-color','#0066B3');
  hg.append('stop').attr('offset','100%').attr('stop-color','#004990');
  groups.forEach((g,i)=>{
    const id=`g-${opts.uid}-${i}`;
    const grad=defs.append('linearGradient').attr('id',id).attr('x1','0').attr('y1','0').attr('x2','0').attr('y2','1');
    grad.append('stop').attr('offset','0%').attr('stop-color',lightenColor(g.color,0.55));
    grad.append('stop').attr('offset','100%').attr('stop-color',g.color).attr('stop-opacity',1);
    g._grad = `url(#${id})`;
  });
  const gEl = svg.append('g').attr('transform',`translate(${M.left},${M.top})`);

  const x0 = d3.scaleBand().domain(groups.map(g=>g.label)).range([0,width])
    .paddingInner(CHART.BAND_INNER).paddingOuter(CHART.BAND_INNER*0.5);
  const subKeys = singleMetric ? [singleMetric] : ['actual','goal'];
  const x1 = d3.scaleBand().domain(subKeys).range([0,x0.bandwidth()]).padding(CHART.BAR_PAD);
  const maxV = d3.max(groups, g=>Math.max(g.actual||0, g.goal||0)) || 1;
  const y = d3.scaleLinear().domain([0, maxV*1.16]).range([height,0]).nice();

  gEl.append('g').call(d3.axisLeft(y).ticks(6).tickSize(-width).tickFormat(''))
    .call(s=>s.select('.domain').remove())
    .call(s=>s.selectAll('line').attr('stroke',CHART.GRID).attr('stroke-dasharray','2,4'));
  gEl.append('g').call(d3.axisLeft(y).ticks(6).tickFormat(yFmt))
    .call(s=>s.select('.domain').remove())
    .call(s=>s.selectAll('line').remove())
    .call(s=>s.selectAll('text').attr('fill',CHART.AXIS).attr('font-size',CHART.LABEL_LO).attr('font-weight','500'));
  if (opts.yLabel){
    gEl.append('text').attr('transform','rotate(-90)').attr('x',-height/2).attr('y',-58)
      .attr('text-anchor','middle').attr('fill','#1C2333')
      .attr('font-size','9px').attr('font-weight','600')
      .text(opts.yLabel);
  }

  const grp = gEl.selectAll('.grp').data(groups).enter().append('g')
    .attr('class','grp')
    .attr('transform',g=>`translate(${x0(g.label)},0)`);

  if (subKeys.includes('actual')){
    const actualBars = grp.append('path').attr('class','bar-actual')
      .attr('d', g=>barPath(x1('actual'), height, x1.bandwidth(), 0, 0))
      .attr('fill', g=>g._grad).attr('opacity',0.96);
    actualBars.append('title').text(g=>`${g.label} · Actual\n${fmtFull(g.actual||0)}${g.goal?('\nGoal '+fmtFull(g.goal)+' · '+pct(g.actual,g.goal)+'%'):''}`);
    let valActual = null;
    if (showValues) {
      grp.append('rect').attr('class','val-actual-bg')
        .attr('x', g=>x1('actual')+x1.bandwidth()/2 - (String(g.actual?valFmt(g.actual):'').length*3.6+9))
        .attr('y', g=>y(g.actual||0)-21).attr('width', g=>String(g.actual?valFmt(g.actual):'').length*7.2+18)
        .attr('height', 20).attr('rx', 6).attr('fill', `url(#${hoverGradId})`).attr('opacity', 0);
      valActual = grp.append('text').attr('class','val-actual')
        .attr('x', x1('actual')+x1.bandwidth()/2).attr('y', g=>y(g.actual||0)-6)
        .attr('text-anchor','middle').attr('font-size',CHART.VAL)
        .attr('font-weight','700').attr('fill', g=>g.color).attr('opacity',0)
        .text(g=>g.actual?valFmt(g.actual):'');
    }
    whenVisible(wrap, ()=>{
      actualBars.transition().duration(700).delay((g,i)=>i*35).ease(d3.easeCubicOut)
        .attr('d', g=>barPath(x1('actual'), y(g.actual||0), x1.bandwidth(), height-y(g.actual||0), CHART.BAR_RX));
      if (valActual) valActual.transition().duration(400).delay((g,i)=>i*35+500).attr('opacity',1);
    });
  }
  if (subKeys.includes('goal')){
    const goalBars = grp.append('path').attr('class','bar-goal')
      .attr('d', g=>barPath(x1('goal'), height, x1.bandwidth(), 0, 0))
      .attr('fill', g=> singleMetric==='goal'?g.color:'none')
      .attr('stroke', g=>g.color).attr('stroke-width',1.6)
      .attr('stroke-dasharray','3,3').attr('opacity', 0);
    goalBars.append('title').text(g=>`${g.label} · Goal\n${fmtFull(g.goal||0)}`);
    let valGoal = null;
    if (showValues && !singleMetric) {
      grp.append('rect').attr('class','val-goal-bg')
        .attr('x', g=>x1('goal')+x1.bandwidth()/2 - (String(g.goal?valFmt(g.goal):'').length*3.2+8))
        .attr('y', g=>y(g.goal||0)-19).attr('width', g=>String(g.goal?valFmt(g.goal):'').length*6.4+16)
        .attr('height', 17).attr('rx', 5).attr('fill', `url(#${hoverGradId})`).attr('opacity', 0);
      valGoal = grp.append('text').attr('class','val-goal')
        .attr('x', x1('goal')+x1.bandwidth()/2).attr('y', g=>y(g.goal||0)-6)
        .attr('text-anchor','middle').attr('font-size',CHART.VAL_LO)
        .attr('font-weight','600').attr('fill', g=>g.color).attr('opacity',0)
        .text(g=>g.goal?valFmt(g.goal):'');
    }
    whenVisible(wrap, ()=>{
      goalBars.transition().duration(700).delay((g,i)=>i*35+80).ease(d3.easeCubicOut)
        .attr('opacity', singleMetric==='goal'?0.55:0.6)
        .attr('d', g=>barPath(x1('goal'), y(g.goal||0), x1.bandwidth(), height-y(g.goal||0), CHART.BAR_RX));
      if (valGoal) valGoal.transition().duration(400).delay((g,i)=>i*35+560).attr('opacity',0.7);
    });
  }

  const xAxis = gEl.append('g').attr('transform',`translate(0,${height})`).call(d3.axisBottom(x0).tickSize(0).tickPadding(16))
    .call(s=>s.select('.domain').remove());
  const xt = xAxis.selectAll('text').attr('fill','#1C2333')
    .attr('font-weight','600').attr('font-size', CHART.LABEL_HI).style('font-family','var(--sans)');
  if (rotate) xt.attr('transform','rotate(-20)').attr('text-anchor','end').attr('dy','0.7em');

  if (!singleMetric && opts.legend !== false){
    const lg = svg.append('g').attr('transform',`translate(${M.left},10)`);
    lg.append('rect').attr('width',11).attr('height',11).attr('rx',2).attr('fill', INK).attr('opacity',0.85);
    lg.append('text').attr('x',16).attr('y',9.5).attr('font-size','9.5px').attr('font-weight','600').attr('fill',CHART.AXIS).text('Actual');
    lg.append('rect').attr('x',68).attr('width',11).attr('height',11).attr('rx',2).attr('fill','none').attr('stroke',INK).attr('stroke-width',1.6).attr('stroke-dasharray','3,3').attr('opacity',0.6);
    lg.append('text').attr('x',84).attr('y',9.5).attr('font-size','9.5px').attr('font-weight','600').attr('fill',CHART.AXIS).text('Goal');
  }
  return { svg, gEl, x0, x1, y, width, height };
}

function ytdActualGoal(getActual, getGoal, keys){
  const out={};
  for (const k of keys){ let a=0,g=0; for(let m=0;m<12;m++){ const av=getActual(k,m)||0; a+=av; if(av>0) g+=getGoal(k,m)||0; } out[k]={actual:a,goal:g}; }
  return out;
}

    breakdownMonth = target;
    (dir>0?nextBtn:prevBtn).classList.remove('flash'); void (dir>0?nextBtn:prevBtn).offsetWidth;
    (dir>0?nextBtn:prevBtn).classList.add('flash');
    slideMonthLabel(windowEl, dir);
    drawRepBreakdownBars(wrap);
    syncArrows();
  }
  prevBtn.addEventListener('click',()=>go(-1));
  nextBtn.addEventListener('click',()=>go(1));

  drawRepBreakdownBars(wrap);
}

/* ============ ACTIVITY FEED ============ */
function renderActivityFeed(){
  const host = document.getElementById('activity-feed'); if (!host) return;
  const rows = window._activityRows;
  if (!rows){
    host.innerHTML = `<p class="af-empty">Waiting for live data from CoreBridge…</p>`;
    return;
  }
  if (!rows.length){
    host.innerHTML = `<p class="af-empty">No orders returned.</p>`;
    return;
  }
  function fmtDate(d){ if(!d) return '—'; return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
  function eventLabel(o){
    const conv = cbDate(o.dateConverted||o.DateConverted);
    const canc = cbDate(o.dateCancelled||o.DateCancelled);
    const comp = cbDate(o.dateCompleted||o.DateCompleted);
    const cre  = cbDate(o.estimateDateCreated||o.EstimateDateCreated||o.dateCreated||o.DateCreated);
    const now  = new Date();
    const isThisYear = d => d && d.getFullYear()===now.getFullYear();
    if (canc && isThisYear(canc)) return { label:'Cancelled', cls:'af-event-cancelled', date:canc };
    if (conv && isThisYear(conv)) return { label:'Converted', cls:'af-event-converted', date:conv };
    if (comp && isThisYear(comp)) return { label:'Completed', cls:'af-event-completed', date:comp };
    if (cre  && isThisYear(cre))  return { label:'New Estimate', cls:'af-event-new', date:cre };
    return { label:'Modified', cls:'', date: cbDate(o.modifiedDate||o.dateModified||o.DateModified) };
  }
  function statusPill(o){
    const kind = classifyRow(o);
    const raw  = (o.status||o.Status||'').toString();
    const label = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase() || 'Unknown';
    const cls = kind==='sale' ? 'af-pill-sale' : kind==='estimate' ? 'af-pill-estimate' : kind==='cancelled' ? 'af-pill-cancelled' : 'af-pill-unknown';
    return `<span class="af-pill ${cls}">${label}</span>`;
  }
  function orderLink(o){
    const tenant = o._tenant || 'FS2025';
    const portal = TENANTS[tenant] ? TENANTS[tenant].portalUrl : '';
    const id = o.orderId || o.OrderId || o.id || o.Id || '';
    if (!id || !portal) return '—';
    const url = `${portal}/SalesModule/Orders/Order.aspx?OrderId=${id}`;
    return `<a class="af-link" href="${url}" target="_blank" rel="noopener">View Detail</a>`;
  }
  function companyCell(o){
    const name = o.companyName || o.CompanyName || o.orderContact || o.OrderContact || '—';
    return `<span class="af-company" title="${name}">${name}</span>`;
  }
  function repCell(o){
    const rep = orderRep(o) || '—';
    return `<span class="af-rep" title="${rep}">${rep}</span>`;
  }
  function orderNumCell(o){
    const est = o.estimateNumber || o.EstimateNumber || '';
    const inv = o.invoiceNumber  || o.InvoiceNumber  || '';
    const num = inv || est || o.orderNumber || o.OrderNumber || o.id || o.Id || '—';
    return `<span class="af-num">${num}</span>`;
  }

  const sorted = rows.slice().sort((a,b)=>{
    const evA = eventLabel(a);
    const evB = eventLabel(b);
    const dA = evA.date || new Date(0);
    const dB = evB.date || new Date(0);
    return dB - dA;
  });

  const thead = `<thead><tr>
    <th>Event</th><th>Date</th><th>Order #</th><th>Company</th>
    <th>Rep</th><th>Center</th><th>Status</th><th>Amount</th><th>Link</th>
  </tr></thead>`;

  const tbodyRows = sorted.map(o=>{
    const ev  = eventLabel(o);
    const amt = orderAmount(o);
    const dot = LOC_COLORS[o._center] || INK;
    const amtCell = amt > 0
      ? `<span class="af-amt">${fmtFull(amt)}</span>`
      : `<span class="af-amt af-amt-zero">—</span>`;
    return `<tr>
      <td><span class="af-event ${ev.cls}">${ev.label}</span></td>
      <td class="af-date">${fmtDate(ev.date)}</td>
      <td>${orderNumCell(o)}</td>
      <td>${companyCell(o)}</td>
      <td>${repCell(o)}</td>
      <td><span class="af-center-dot" style="background:${dot}"></span>${o._center||'—'}</td>
      <td>${statusPill(o)}</td>
      <td>${amtCell}</td>
      <td>${orderLink(o)}</td>
    </tr>`;
  }).join('');

  host.innerHTML = `<div class="card" style="padding:0;overflow:hidden;"><table class="af-table">${thead}<tbody>${tbodyRows}</tbody></table></div>`;
}

/* ============ HEADER TICKER ============ */
let _tickerMsgs = [], _tickerIdx = 0, _tickerTimer = null;
function expectedPacePct(){
  const now = new Date();
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  return ((now.getMonth() + now.getDate()/daysInMonth) / 12) * 100;
}
function buildTickerMessages(){
  const expected = expectedPacePct();
  return LOCATIONS.map(loc=>{
    const {actual,goal} = annualLoc(loc);
    const p = pct(actual,goal);
    const up = p >= expected;
    const pctClass = up ? 'ht-up' : 'ht-down';
    const arrow = up ? '↑' : '↓';
    const html = `<b>${loc.toUpperCase()}</b> <span class="ht-dim">Goal</span> ${fmt(goal)} <span class="ht-dim">·</span> ${fmt(actual)} <span class="ht-dim">achieved ·</span> <span class="${pctClass}">${arrow} ${p}%</span>`;
    return { html, trend: up ? 'up' : 'down' };
  });
}
function refreshHeaderTicker(){
  const el = document.getElementById('header-ticker'); if (!el) return;
  _tickerMsgs = buildTickerMessages();
  if (_tickerIdx >= _tickerMsgs.length) _tickerIdx = 0;
  const inner = el.querySelector('.ht-inner');
  if (inner && _tickerMsgs.length){
    inner.innerHTML = _tickerMsgs[_tickerIdx].html;
    inner.classList.remove('flash-up','flash-down');
    void inner.offsetWidth;
    inner.classList.add(_tickerMsgs[_tickerIdx].trend==='up' ? 'flash-up' : 'flash-down');
  }
  if (!_tickerTimer && _tickerMsgs.length > 1){
    _tickerTimer = setInterval(()=>{
      const inner = document.querySelector('#header-ticker .ht-inner'); if (!inner) return;
      inner.classList.add('ht-swap');
      setTimeout(()=>{
        _tickerIdx = (_tickerIdx+1) % _tickerMsgs.length;
        inner.innerHTML = _tickerMsgs[_tickerIdx].html;
        inner.classList.remove('ht-swap','flash-up','flash-down');
        void inner.offsetWidth;
        inner.classList.add(_tickerMsgs[_tickerIdx].trend==='up' ? 'flash-up' : 'flash-down');
      }, 500);
    }, 4000);
  }
}

/* ============ CUSTOM TOOLTIPS ============ */
(function initCustomTooltips(){
  const tip = document.createElement('div');
  tip.className = 'custom-tooltip';
  document.body.appendChild(tip);
  let active = null;
  function findTitleSource(el){
    while (el && el.nodeType===1 && el !== document.body){
      if (el.hasAttribute && el.hasAttribute('title') && el.getAttribute('title')){
        return { el, kind:'attr', value: el.getAttribute('title') };
      }
      const titleChild = el.querySelector ? el.querySelector(':scope > title') : null;
      if (titleChild && titleChild.textContent) return { el, kind:'svg', value: titleChild.textContent, node: titleChild };
      el = el.parentElement;
    }
    return null;
  }
  function position(e){
    const gap=16, r=tip.getBoundingClientRect();
    let x = e.clientX - r.width/2;
    let y = e.clientY - r.height - gap;
    if (x < 8) x = 8;
    if (x + r.width > window.innerWidth-8) x = window.innerWidth - 8 - r.width;
    if (y < 8) y = e.clientY + gap;
    tip.style.left = x+'px'; tip.style.top = y+'px';
  }
  function restore(){
    if (!active) return;
    if (active.kind==='attr') active.el.setAttribute('title', active.value);
    else active.el.insertBefore(active.node, active.el.firstChild);
    active = null;
  }
  document.addEventListener('mouseover', e=>{
    const src = findTitleSource(e.target);
    if (!src || (active && src.el === active.el)) return;
    if (active) restore();
    active = src;
    if (src.kind==='attr') src.el.removeAttribute('title');
    else src.node.remove();
    tip.textContent = src.value;
    tip.classList.add('show');
    position(e);
  });
  document.addEventListener('mousemove', e=>{ if (active) position(e); });
  document.addEventListener('mouseout', e=>{
    if (!active) return;
    if (active.el.contains(e.relatedTarget)) return;
    restore();
    tip.classList.remove('show');
  });
  window.addEventListener('scroll', ()=>{ if(active){ restore(); tip.classList.remove('show'); } }, true);
})();

/* ============ SCROLL REVEAL ============ */
function initScrollReveal(){
  const prefersReduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const sections = document.querySelectorAll('.page .section');
  if (prefersReduced || !('IntersectionObserver' in window)){
    sections.forEach(s=>s.classList.add('revealed'));
    return;
  }
  const io = new IntersectionObserver((entries)=>{
    for (const e of entries){
      if (e.isIntersecting){ e.target.classList.add('revealed'); io.unobserve(e.target); }
    }
  }, { threshold: 0.12, rootMargin: '0px 0px -12% 0px' });
  sections.forEach(s=>io.observe(s));
  requestAnimationFrame(()=>{
    if (sections[0]){
      const r = sections[0].getBoundingClientRect();
      if (r.top < window.innerHeight * 0.9) sections[0].classList.add('revealed');
    }
  });
}

if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', ()=>{ init(); initScrollReveal(); });
else { init(); initScrollReveal(); }

})();
